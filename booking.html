<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Taxi | Travel With Choudhary</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/booking.css">

</head>

<body>

    <section class="booking-section">

        <div class="container">

            <h2>Book Your Taxi</h2>

            <form id="bookingForm">

                <div class="form-group">

                    <label>Trip</label>

                    <input type="text" id="trip" readonly>

                </div>

                <div class="form-group">

                    <label>Customer Name</label>

                    <input type="text" id="customer_name" required>

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="tel" id="phone" required>

                </div>

                <div class="form-group">

                    <label>Pickup Location</label>

                    <input type="text" id="pickup" required>

                </div>

                <div class="form-group">

                    <label>Destination</label>

                    <input type="text" id="destination" required>

                </div>

                <div class="form-group">

                    <label>Journey Date</label>

                    <input type="date" id="journey_date" required>

                </div>

                <div class="form-group">

                    <label>Journey Time</label>

                    <input type="time" id="journey_time" required>

                </div>

                <div class="form-group">

                    <label>Passengers</label>

                    <input type="number" id="passengers" min="1" required>

                </div>

                <div class="form-group">

                    <label>Vehicle</label>

                    <input type="text" id="vehicle">

                </div>

                <div class="form-group">

                    <label>Message</label>

                    <textarea id="message" rows="5"></textarea>

                </div>

                <button type="submit" class="book-btn">

Submit Booking

</button>

            </form>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>
    <script src="js/config.js"></script>
    <script src="js/booking.js"></script>

</body>

</html>
