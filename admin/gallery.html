<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Gallery</title>

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <div class="admin">

        <!-- =========================
        SIDEBAR
    ========================== -->

        <aside class="sidebar">

            <h2>Admin Panel</h2>

            <a href="dashboard.html">Dashboard</a>

            <a href="trips.html">Trips</a>

            <a href="gallery.html" class="active">

            Gallery

        </a>

            <a href="reviews.html">

            Reviews

        </a>

            <a href="bookings.html">

            Bookings

        </a>

            <a href="settings.html">

            Settings

        </a>

            <a href="#" id="logoutBtn">

            Logout

        </a>

        </aside>



        <!-- =========================
        CONTENT
    ========================== -->

        <main class="content">

            <div class="page-header">

                <h1>

                    Manage Gallery

                </h1>

                <button id="addImageBtn" class="yellow-btn">

                + Add Image

            </button>

            </div>



            <!-- Gallery -->

            <div id="galleryList" class="gallery-list">

                Loading...

            </div>

        </main>

    </div>



    <!-- =====================================
        MODAL
====================================== -->

    <div id="galleryModal" class="modal">

        <div class="modal-box gallery-modal">

            <h2 id="galleryTitle">

                Add Image

            </h2>


            <input type="hidden" id="imageId">


            <!-- TITLE -->

            <label>

            Image Title

        </label>

            <input type="text" id="imageTitle" placeholder="Image Title">


            <!-- CATEGORY -->

            <label>

            Category

        </label>

            <select id="imageCategory">

            <option value="gallery">

                Gallery

            </option>

            <option value="hero">

                Hero

            </option>

            <option value="route">

                Route

            </option>

        </select>


            <!-- IMAGE -->

            <label>

            Select Image

        </label>

            <input type="file" id="imageFile" accept="image/*">


            <input type="hidden" id="imageUrl">


            <!-- Preview -->

            <div class="preview-box">

                <img id="previewImage" src="../images/no-image.png" alt="Preview">

            </div>


            <div class="modal-buttons">

                <button id="saveImageBtn" class="yellow-btn">

                Save Image

            </button>

                <button id="closeGalleryBtn" class="cancel-btn">

                Cancel

            </button>

            </div>

        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../js/supabase.js"></script>

    <script src="../js/config.js"></script>

    <script src="js/admin-gallery.js"></script>

</body>

</html>
