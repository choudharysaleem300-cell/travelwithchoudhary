<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Trips</title>

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <div class="admin">

        <!-- Sidebar -->

        <aside class="sidebar">

            <h2>Admin Panel</h2>

            <a href="dashboard.html">Dashboard</a>
            <a href="trips.html" class="active">Trips</a>
            <a href="gallery.html">Gallery</a>
            <a href="reviews.html">Reviews</a>
            <a href="bookings.html">Bookings</a>
            <a href="settings.html">Settings</a>

            <a href="#" id="logoutBtn">Logout</a>

        </aside>

        <!-- Content -->

        <main class="content">

            <div class="page-header">

                <h1>Manage Trips</h1>

                <button id="addTripBtn" class="yellow-btn">

                + Add Trip

            </button>

            </div>

            <div id="tripList" class="trip-list">

                Loading...

            </div>

        </main>

    </div>


    <!-- ========================= -->
    <!-- Modal -->
    <!-- ========================= -->

    <div id="tripModal" class="modal">

        <div class="modal-box trip-modal">

            <h2 id="modalTitle">

                Add Trip

            </h2>

            <input type="hidden" id="tripId">

            <div class="form-grid">

                <input type="text" id="tripName" placeholder="Trip Name">

                <input type="text" id="fromLocation" placeholder="From Location">

                <input type="text" id="toLocation" placeholder="To Location">

                <input type="text" id="distance" placeholder="Distance">

                <input type="text" id="duration" placeholder="Duration">

                <input type="number" id="price" placeholder="Price">

            </div>

            <textarea id="description" rows="5" placeholder="Trip Description"></textarea>

            <br><br>

            <!-- IMAGE -->

            <label>

            Trip Image

        </label>

            <input type="file" id="tripImage" accept="image/*">

            <input type="hidden" id="imageUrl">

            <div class="preview-box">

                <img id="previewImage" src="../images/no-image.png">

            </div>

            <br>

            <!-- FEATURED -->

            <label>

            Featured

        </label>

            <select id="featured">

            <option value="true">

                Yes

            </option>

            <option value="false">

                No

            </option>

        </select>

            <br><br>

            <!-- STATUS -->

            <label>

            Status

        </label>

            <select id="status">

            <option value="true">

                Active

            </option>

            <option value="false">

                Inactive

            </option>

        </select>

            <br><br>

            <div class="modal-buttons">

                <button id="saveTripBtn" class="yellow-btn">

                Save Trip

            </button>

                <button id="closeModalBtn" class="cancel-btn">

                Cancel

            </button>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../js/supabase.js"></script>

    <script src="../js/config.js"></script>

    <script src="js/admin-trips.js"></script>

</body>

</html>
